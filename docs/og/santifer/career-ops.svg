<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad-santifer-career-ops" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  

  <!-- Ground -->
  <rect width="1200" height="630" fill="#030712"/>

  <!-- Subtle vignette -->
  <defs>
    <radialGradient id="vign-santifer-career-ops" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#vign-santifer-career-ops)"/>

  <!-- Gold overlay tint -->
  <rect width="1200" height="630" fill="url(#grad-santifer-career-ops)"/>

  <!-- Outer hairline border -->
  <rect x="1" y="1" width="1198" height="628"
    fill="none" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>

  <!-- Corner ornaments TL -->
  <path d="M 20 20 L 20 44 M 20 20 L 44 20"
    stroke="rgba(251,191,36,0.4)" stroke-width="1.5" fill="none"/>
  <!-- Corner ornaments BR -->
  <path d="M 1180 610 L 1180 586 M 1180 610 L 1156 610"
    stroke="rgba(251,191,36,0.4)" stroke-width="1.5" fill="none"/>

  <!-- ─── Left column ─── -->
  <!-- Diamond Seal -->
  <svg x="48" y="52" width="52" height="52" viewBox="0 0 64 64">
    <path d="M 32 4 L 60 32 L 32 60 L 4 32 Z"
      fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linejoin="miter" opacity="0.7"/>
    <text x="32" y="34" font-family="Georgia,serif" font-weight="600" font-size="28"
      fill="#fbbf24" text-anchor="middle" dominant-baseline="central" opacity="0.7">G</text>
  </svg>

  <!-- Tier glyph (large) -->
  <text x="48" y="175" font-family="Georgia,serif" font-size="52"
    fill="#fbbf24" opacity="0.85">○</text>

  <!-- Stars -->
  <polygon points="64.00,426.00 66.12,432.09 72.56,432.22 67.42,436.11 69.29,442.28 64.00,438.60 58.71,442.28 60.58,436.11 55.44,432.22 61.88,432.09" fill="#fbbf24"/>
<polygon points="86.00,426.00 88.12,432.09 94.56,432.22 89.42,436.11 91.29,442.28 86.00,438.60 80.71,442.28 82.58,436.11 77.44,432.22 83.88,432.09" fill="#fbbf24"/>
<polygon points="108.00,426.00 110.12,432.09 116.56,432.22 111.42,436.11 113.29,442.28 108.00,438.60 102.71,442.28 104.58,436.11 99.44,432.22 105.88,432.09" fill="#fbbf24"/>
<polygon points="130.00,426.00 132.12,432.09 138.56,432.22 133.42,436.11 135.29,442.28 130.00,438.60 124.71,442.28 126.58,436.11 121.44,432.22 127.88,432.09" fill="#333d4d"/>
<polygon points="152.00,426.00 154.12,432.09 160.56,432.22 155.42,436.11 157.29,442.28 152.00,438.60 146.71,442.28 148.58,436.11 143.44,432.22 149.88,432.09" fill="#333d4d"/>
<polygon points="174.00,426.00 176.12,432.09 182.56,432.22 177.42,436.11 179.29,442.28 174.00,438.60 168.71,442.28 170.58,436.11 165.44,432.22 171.88,432.09" fill="#333d4d"/>

  <!-- Vertical rule -->
  <line x1="220" y1="40" x2="220" y2="590"
    stroke="rgba(251,191,36,0.12)" stroke-width="1"/>

  <!-- ─── Right / main column ─── -->
  <!-- Skill name -->
  <text x="264" y="160"
    font-family="EB Garamond,Georgia,serif"
    font-size="52" font-weight="600"
    fill="#fbbf24" dominant-baseline="middle">Career-Ops</text>

  <!-- Title (italic subtitle) -->
  <text x="264" y="220" font-family="EB Garamond,Georgia,serif" font-size="22" font-style="italic" fill="rgba(226,232,240,0.5)" dominant-baseline="middle">The Professional&#x27;s Edge</text>

  <!-- Horizontal rule -->
  <line x1="264" y1="256" x2="1152" y2="256"
    stroke="rgba(251,191,36,0.2)" stroke-width="1"/>

  <!-- Description -->
  <text x="264" y="298"
    font-family="Bricolage Grotesque,Helvetica,Arial,sans-serif"
    font-size="18" fill="rgba(226,232,240,0.65)">
    <tspan x="264" dy="0">Agentic job search pipeline that automates scanning, fit</tspan>
<tspan x="264" dy="28">scoring, and CV tailoring.</tspan>
  </text>

  <!-- Evidence class chip -->
  <rect x="264" y="504" width="80" height="28"
    rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="276" y="518"
    font-family="monospace" font-size="11" letter-spacing="1.5"
    fill="rgba(226,232,240,0.5)" dominant-baseline="middle"
    text-transform="uppercase">CLASS B</text>

  <!-- Level badge -->
  <text x="1136" y="518"
    font-family="EB Garamond,Georgia,serif" font-size="20" font-weight="600"
    fill="#fbbf24" text-anchor="end" dominant-baseline="middle">3★</text>

  <!-- Horizontal rule bottom -->
  <line x1="264" y1="550" x2="1152" y2="550"
    stroke="rgba(251,191,36,0.2)" stroke-width="1"/>

  <!-- Contributor handle -->
  <text x="264" y="590"
    font-family="'Bricolage Grotesque',sans-serif" font-size="18" font-weight="600"
    fill="#ef4444" dominant-baseline="middle">@santifer</text>

  <!-- Gaia wordmark (bottom-right) -->
  <text x="1136" y="590"
    font-family="EB Garamond,Georgia,serif" font-size="18" font-weight="600"
    fill="rgba(226,232,240,0.3)" text-anchor="end" dominant-baseline="middle">Gaia</text>

  <!-- Bottom underline accent -->
  <line x1="400" y1="626" x2="800" y2="626"
    stroke="#fbbf24" stroke-width="2" stroke-opacity="0.3"/>
</svg>
