<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  width="1200" height="630" viewBox="0 0 1200 630"
  class="plaque plaque--og" data-type="extra" data-level="3">
  <style><![CDATA[
:root {
  --tier-basic: #38bdf8;
  --tier-basic-rgb: 56,189,248;
  --tier-extra: #c084fc;
  --tier-extra-rgb: 192,132,252;
  --tier-unique: #7c3aed;
  --tier-unique-rgb: 124,58,237;
  --tier-ultimate: #f59e0b;
  --tier-ultimate-rgb: 245,158,11;
  --rank-0: #94a3b8;
  --rank-1: #38bdf8;
  --rank-2: #63cab7;
  --rank-3: #a78bfa;
  --rank-4: #e879f9;
  --rank-5: #fbbf24;
  --rank-6: #fbbf24;
  --honor-red: #ef4444;
  --apex-gold: #fbbf24;
}
.plaque__slug { fill: var(--apex-gold); }
.plaque__handle { fill: var(--honor-red); }
.plaque__title { fill: rgba(226,232,240,0.5); }
.plaque__description { fill: rgba(226,232,240,0.65); }
.plaque__tag { fill: rgba(226,232,240,0.45); }
]]></style>
  <defs>
    <linearGradient id="grad-safishamsi-graphify" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  

  <!-- Ground -->
  <rect width="1200" height="630" fill="#030712"/>

  <!-- Subtle vignette -->
  <defs>
    <radialGradient id="vign-safishamsi-graphify" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#vign-safishamsi-graphify)"/>

  <!-- Gold overlay tint -->
  <rect width="1200" height="630" fill="url(#grad-safishamsi-graphify)"/>

  <!-- Outer hairline border -->
  <rect x="1" y="1" width="1198" height="628"
    fill="none" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>

  <!-- Corner ornaments TL -->
  <path d="M 20 20 L 20 44 M 20 20 L 44 20"
    stroke="rgba(251,191,36,0.4)" stroke-width="1.5" fill="none"/>
  <!-- Corner ornaments BR -->
  <path d="M 1180 610 L 1180 586 M 1180 610 L 1156 610"
    stroke="rgba(251,191,36,0.4)" stroke-width="1.5" fill="none"/>

  <!-- ─── Left column (seal + tier glyph + stars) ─── -->
  <!-- Diamond Seal -->
  <svg x="48" y="52" width="52" height="52" viewBox="0 0 64 64">
    <path d="M 32 4 L 60 32 L 32 60 L 4 32 Z"
      fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linejoin="miter" opacity="0.7"/>
    <text x="32" y="34" font-family="Georgia,serif" font-weight="600" font-size="28"
      fill="#fbbf24" text-anchor="middle" dominant-baseline="central" opacity="0.7">G</text>
  </svg>

  <!-- Tier glyph (large) -->
  <text x="48" y="175" font-family="Georgia,serif" font-size="52"
    fill="#fbbf24" opacity="0.85">○</text>

  <!-- Stars (.plaque__rank stars variant) -->
  <polygon points="64.00,426.00 66.12,432.09 72.56,432.22 67.42,436.11 69.29,442.28 64.00,438.60 58.71,442.28 60.58,436.11 55.44,432.22 61.88,432.09" fill="#fbbf24" opacity="1"/>
<polygon points="86.00,426.00 88.12,432.09 94.56,432.22 89.42,436.11 91.29,442.28 86.00,438.60 80.71,442.28 82.58,436.11 77.44,432.22 83.88,432.09" fill="#fbbf24" opacity="1"/>
<polygon points="108.00,426.00 110.12,432.09 116.56,432.22 111.42,436.11 113.29,442.28 108.00,438.60 102.71,442.28 104.58,436.11 99.44,432.22 105.88,432.09" fill="#fbbf24" opacity="1"/>
<polygon points="130.00,426.00 132.12,432.09 138.56,432.22 133.42,436.11 135.29,442.28 130.00,438.60 124.71,442.28 126.58,436.11 121.44,432.22 127.88,432.09" fill="#fbbf24" opacity="0.18"/>
<polygon points="152.00,426.00 154.12,432.09 160.56,432.22 155.42,436.11 157.29,442.28 152.00,438.60 146.71,442.28 148.58,436.11 143.44,432.22 149.88,432.09" fill="#fbbf24" opacity="0.18"/>
<polygon points="174.00,426.00 176.12,432.09 182.56,432.22 177.42,436.11 179.29,442.28 174.00,438.60 168.71,442.28 170.58,436.11 165.44,432.22 171.88,432.09" fill="#fbbf24" opacity="0.18"/>

  <!-- Vertical rule -->
  <line x1="220" y1="40" x2="220" y2="590"
    stroke="rgba(251,191,36,0.12)" stroke-width="1"/>

  <!-- ─── Right column (slug / title / description / tags / install) ─── -->
  <!-- Slug (.plaque__slug) -->
  <text class="plaque__slug" x="264" y="150"
    font-family="EB Garamond,Georgia,serif"
    font-size="52" font-weight="600"
    fill="#fbbf24" dominant-baseline="middle">Graphify</text>

  <!-- Title (.plaque__title — italic subtitle) -->
  <text class="plaque__title" x="264" y="210" font-family="EB Garamond,Georgia,serif" font-size="22" font-style="italic" fill="rgba(226,232,240,0.5)" dominant-baseline="middle">The Structural Muse</text>

  <!-- Horizontal rule -->
  <line x1="264" y1="240" x2="1152" y2="240"
    stroke="rgba(251,191,36,0.2)" stroke-width="1"/>

  <!-- Description (.plaque__description) -->
  <text class="plaque__description" x="264" y="278"
    font-family="Bricolage Grotesque,Helvetica,Arial,sans-serif"
    font-size="18" fill="rgba(226,232,240,0.65)">
    <tspan x="264" dy="0">Maps codebases and documentation into a queryable</tspan>
<tspan x="264" dy="26">knowledge graph using AST analysis and semantic</tspan>
<tspan x="264" dy="26">extraction.…</tspan>
  </text>

  <!-- Tags row (.plaque__tags / .plaque__tag) -->
  <rect class="plaque__tag-bg" x="264" y="470" width="138" height="22" rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text class="plaque__tag" x="273" y="485" font-family="'Departure Mono','JetBrains Mono',monospace" font-size="11" letter-spacing="0.5">knowledge-graph</text>
  <rect class="plaque__tag-bg" x="408" y="470" width="60" height="22" rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text class="plaque__tag" x="417" y="485" font-family="'Departure Mono','JetBrains Mono',monospace" font-size="11" letter-spacing="0.5">rag</text>
  <rect class="plaque__tag-bg" x="474" y="470" width="60" height="22" rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text class="plaque__tag" x="483" y="485" font-family="'Departure Mono','JetBrains Mono',monospace" font-size="11" letter-spacing="0.5">ast</text>

  <!-- Install row (.plaque__install-row) -->
  <rect class="plaque__install-bg" x="264" y="510" width="888" height="32" rx="4" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/><text class="plaque__install-prompt" x="276" y="531" font-family="'Departure Mono','JetBrains Mono',monospace" font-size="13" fill="#fbbf24">$</text><text class="plaque__install-cmd" x="292" y="531" font-family="'Departure Mono','JetBrains Mono',monospace" font-size="13" fill="rgba(226,232,240,0.75)">gaia install safishamsi/graphify</text>

  <!-- Evidence class chip (.plaque__evidence) -->
  <rect class="plaque__evidence-bg" x="264" y="560" width="80" height="22"
    rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text class="plaque__evidence" x="276" y="575"
    font-family="monospace" font-size="11" letter-spacing="1.5"
    fill="rgba(226,232,240,0.5)" dominant-baseline="middle">CLASS B</text>

  <!-- Level chip (.plaque__rank chip variant — mirrors Stage 2 sibling) -->
  <rect x="1080" y="559" width="56" height="26" rx="13" fill="rgba(167,139,250,.15)" stroke="rgba(167,139,250,.4)" stroke-width="1"/><text x="1124" y="575" font-family="'Departure Mono','JetBrains Mono',monospace" font-size="13" font-weight="600" letter-spacing="1.2" fill="#a78bfa" text-anchor="end" dominant-baseline="middle">3★</text>

  <!-- Contributor handle (.plaque__handle) -->
  <text class="plaque__handle" x="264" y="605"
    font-family="'Bricolage Grotesque',sans-serif" font-size="18" font-weight="600"
    fill="#ef4444" dominant-baseline="middle">@safishamsi</text>

  <!-- Gaia wordmark (bottom-right) -->
  <text x="1136" y="605"
    font-family="EB Garamond,Georgia,serif" font-size="18" font-weight="600"
    fill="rgba(226,232,240,0.3)" text-anchor="end" dominant-baseline="middle">Gaia</text>

  <!-- Bottom underline accent (.plaque__underline) -->
  <line class="plaque__underline" x1="400" y1="626" x2="800" y2="626"
    stroke="#fbbf24" stroke-width="2" stroke-opacity="0.3"/>
</svg>
