<!DOCTYPE html>
<html lang="en" data-icon-base="../assets/icons.svg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organic Tree Sampler — Gaia</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Bricolage+Grotesque:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/plaque.css">
  <script src="../js/icons.js"></script>
  <script src="../js/rank-badge.js"></script>
  <script src="../js/plaque.js"></script>
  <style>
    body { background: var(--bg); color: var(--text); padding: 2rem; }
    .active-path { stroke: #00f2ff !important; stroke-width: 4px !important; filter: drop-shadow(0 0 5px #00f2ff); }
  </style>
</head>
<body>
  <div id="treeContainer"></div>
  <script src="../js/named-skills.js"></script>
  <script>
    (function() {
      Promise.all([
        fetch('../graph/gaia.json').then(r => r.json()),
        fetch('../graph/named/index.json').then(r => r.json())
      ]).then(results => {
        const [graph, index] = results;
        window._gaiaSkillMap = {};
        graph.skills.forEach(s => window._gaiaSkillMap[s.id] = s);
        
        const allNamed = [];
        Object.values(index.buckets || {}).forEach(arr => allNamed.push(...arr));
        
        const container = document.getElementById('treeContainer');
        container.innerHTML = window.gaiaViewFields ? window.gaiaViewFields('tree') : ''; // not exactly right but ignore
        
        // Use the actual function from named-skills.js
        if (typeof renderFlowchartView === 'function') {
           container.innerHTML = renderFlowchartView(allNamed);
        }
      });
    })();
  </script>
</body>
</html>
