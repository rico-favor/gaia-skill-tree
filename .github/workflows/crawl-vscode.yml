name: "VS Code Marketplace Crawl"

on:
  schedule:
    - cron: "0 6 * * 3"  # Wednesday 6am UTC
  workflow_dispatch: {}

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests==2.33.1 pyyaml==6.0.3

      - name: Run VS Code Marketplace crawler
        run: python scripts/crawlers/vscode_marketplace/crawler.py

      - name: Check for proposals
        id: check
        run: |
          if [ -d proposals ] && [ "$(ls proposals/vscode-*.json 2>/dev/null)" ]; then
            echo "has_proposals=true" >> $GITHUB_OUTPUT
          else
            echo "has_proposals=false" >> $GITHUB_OUTPUT
          fi

      - name: Push proposal branch
        if: steps.check.outputs.has_proposals == 'true'
        run: |
          git config --global user.name "mbtiongson1"
          git config --global user.email "marco.tngsn@gmail.com"

          DATE=$(date +%Y-%m-%d)
          BRANCH="bot/vscode/$DATE"
          git checkout -B "$BRANCH"
          git add proposals/
          git commit -m "[bot] Add skills from VS Code Marketplace ($DATE)"
          git push --force-with-lease origin "$BRANCH"
