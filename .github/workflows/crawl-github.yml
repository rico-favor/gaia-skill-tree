name: "GitHub Crawl"

on:
  schedule:
    - cron: "0 6 * * 5"  # Friday 6am UTC
  workflow_dispatch: {}

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run GitHub crawler
        run: python scripts/crawlers/github/crawler.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for proposals
        id: check
        run: |
          if [ -d proposals ] && [ "$(ls proposals/github-*.json 2>/dev/null)" ]; then
            echo "has_proposals=true" >> $GITHUB_OUTPUT
          else
            echo "has_proposals=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.check.outputs.has_proposals == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="bot/github/$DATE"
          git checkout -b "$BRANCH"
          git add proposals/
          git commit -m "[bot] Add skills from GitHub ($DATE)"
          git push origin "$BRANCH"
          gh pr create \
            --title "[bot] Add skills from GitHub ($DATE)" \
            --body "Auto-generated by GitHub crawler. Review proposals/ for candidates with Class B evidence (reproducible repos)." \
            --label "bot-proposal" \
            --label "source:github"
