name: Validate Gaia Graph

on:
  push:
    branches:
      - main
    paths:
      - 'registry/**'
      - 'registry/schema/**'
      - 'skill-trees/**'
      - 'registry-for-review/**'
      - 'scripts/**'
      - 'packages/cli-npm/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'registry/**'
      - 'registry/schema/**'
      - 'skill-trees/**'
      - 'registry-for-review/**'
      - 'scripts/**'
      - 'packages/cli-npm/**'
      - 'tests/**'
      - '.github/workflows/**'
  workflow_dispatch: {}

jobs:
  validate:
    name: Schema + DAG + Integrity Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run validation
        run: python scripts/validate.py

      - name: Run intake validation
        run: python scripts/validate_intake.py

      - name: Check generated docs
        run: python scripts/build_docs.py --check

      - name: Run tests
        run: pytest tests/
