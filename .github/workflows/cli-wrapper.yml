name: CLI Wrapper

on:
  pull_request:
    paths:
      - 'packages/cli-npm/**'
      - '.github/workflows/cli-wrapper.yml'
  workflow_dispatch: {}

jobs:
  test:
    name: Build, Test, and Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/cli-npm/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install npm dependencies
        working-directory: packages/cli-npm
        run: npm ci

      - name: Run wrapper unit tests
        working-directory: packages/cli-npm
        run: npm test

      - name: Verify package can be installed
        working-directory: packages/cli-npm
        run: |
          set -euo pipefail
          TARBALL="$(npm pack --silent | tail -n 1)"
          TMPDIR="$(mktemp -d)"
          cp "$TARBALL" "$TMPDIR/"
          cd "$TMPDIR"
          npm init -y >/dev/null
          npm install "./$TARBALL" >/dev/null
          ./node_modules/.bin/gaia --help
